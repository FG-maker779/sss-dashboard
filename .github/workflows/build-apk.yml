name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g @bubblewrap/cli
      - run: |
          bubblewrap init --manifest https://FG-maker779.github.io/sss-dashboard/manifest.json
          bubblewrap build
      - uses: actions/upload-artifact@v4
        with:
          name: sss-dashboard-apk
          path: app-release-signed.apk
